name: DDoS Defense System — CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run detector unit tests
        run: python tests/test_detector.py

      - name: Run full Division 3 test suite
        run: python tests/test_division3.py

      - name: Check syntax — all Python files
        run: |
          python -m py_compile app/__init__.py
          python -m py_compile app/security.py
          python -m py_compile app/simulator_manager.py
          python -m py_compile app/detector/engine.py
          python -m py_compile app/detector/rules.py
          python -m py_compile app/ml/isolation_forest.py
          python -m py_compile app/ml/feature_extractor.py
          echo "✅ All syntax checks passed"
