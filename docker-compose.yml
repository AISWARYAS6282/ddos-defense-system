services:

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ddosuser
      POSTGRES_PASSWORD: ddospass
      POSTGRES_DB: ddosdefense
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ddosuser -d ddosdefense"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["python", "run.py"]
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ddosuser:ddospass@db:5432/ddosdefense
      SANDBOX_AGENT_URL: http://sandbox_agent:5001
      FLASK_ENV: development
    ports:
      - "5000:5000"
    networks:
      - internal
    volumes:
      - .:/app

  sandbox_agent:
    build:
      context: ./sandbox_agent
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      SANDBOX_AGENT_TOKEN: change-me-sandbox-token
      AGENT_PORT: "5001"
    ports:
      - "5001:5001"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - internal
      - external

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  pgdata:
    driver: local
